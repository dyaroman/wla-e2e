trigger:
  batch: true
  branches:
    include:
      - master
      - feature/*

pool:
  name: CI-POOL-NAME

resources:
  pipelines:
    - pipeline: app
      source: websites-list-app
      trigger:
        branches:
          include:
            - master
            - feature/*

    - pipeline: data
      source: StaticWebsites-Data
      trigger:
        branches:
          include:
            - master
            - development

#    - pipeline: sms
#      project: SMS Publisher
#      source: SMSApp
#      trigger:
#        branches:
#          include:
#            - develop
#            - feature/*

steps:
  - task: NodeTool@0
    displayName: 'use node 18.16.x'
    inputs:
      versionSpec: 18.16.x
      checkLatest: true

  - checkout: self
    displayName: 'checkout'

  - task: Npm@1
    displayName: 'npm ci'
    inputs:
      command: custom
      verbose: false
      customCommand: 'ci --omit=dev'

  - powershell: Start-Sleep -Seconds 60
    displayName: 'wait for 1m'
    condition: |
      and(
        succeeded(),
        eq(variables['Resources.TriggeringAlias'], 'data')
      )

  - powershell: npx cross-env HEADLESS=true URL=dev.example-app.com ENV=dev codeceptjs run --grep "#static" --steps
    displayName: 'run dev env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        or(
          ne(variables['Build.Reason'], 'ResourceTrigger'),
          eq(variables['Resources.TriggeringAlias'], 'app'),
          and(
            eq(variables['Resources.TriggeringAlias'], 'data'),
            eq(variables['resources.pipeline.data.sourceBranch'], 'refs/heads/development')
          )
        )
      )

  - powershell: npx cross-env HEADLESS=true URL=prod.example-app.com ENV=prod codeceptjs run --grep "#static" --steps
    displayName: 'run prod env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        or(
          ne(variables['Build.Reason'], 'ResourceTrigger'),
          eq(variables['Resources.TriggeringAlias'], 'app'),
          and(
            eq(variables['Resources.TriggeringAlias'], 'data'),
            eq(variables['resources.pipeline.data.sourceBranch'], 'refs/heads/master')
          )
        )
      )

  #  - powershell: npx cross-env HEADLESS=true URL=sms-app.example.com DATA_URL=sms-app.example.com codeceptjs run --grep "#sms" --steps
  #    displayName: 'run sms static websites tests'
  #    continueOnError: true
  #    condition: |
  #      or(
  #        ne(variables['Build.Reason'], 'ResourceTrigger'),
  #        eq(variables['Resources.TriggeringAlias'], 'sms')
  #      )

  - task: PublishPipelineArtifact@1
    displayName: 'publish data'
    inputs:
      targetPath: $(System.DefaultWorkingDirectory)/output
