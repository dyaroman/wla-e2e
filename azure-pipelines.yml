trigger:
  batch: true
  branches:
    include:
      - master
      - development
      - feature/*

variables:
  - name: IsMasterBranch
    value: ${{ startsWith(variables['build.sourceBranch'], 'refs/heads/master') }}

pool:
  name: CI-POOL-NAME

resources:
  pipelines:
    - pipeline: wla
      source: websites-list-app
      trigger:
        branches:
          include:
            - master
            - development

    - pipeline: websitesData
      source: StaticWebsites-Data
      trigger:
        branches:
          include:
            - master
            - development

steps:
  - task: NodeTool@0
    displayName: 'Use node 20.17.x'
    inputs:
      versionSpec: 20.17.x
      checkLatest: true

  - checkout: self
    displayName: 'Checkout tests'

  - powershell: |
      git checkout development
      git reset --hard origin/development
    displayName: 'Switch git branch to development'
    condition: |
      and(
        succeeded(),
        or(
          and(
            ne(variables['Build.Reason'], 'ResourceTrigger'),
            eq(variables['IsMasterBranch'], false)
          ),
          and(
            eq(variables['Resources.TriggeringAlias'], 'wla'),
            eq(variables['resources.pipeline.wla.sourceBranch'], 'refs/heads/development')
          )
        )
      )

  - script: npm pkg delete scripts.prepare
    displayName: 'Remove prepare script'

  - task: Npm@1
    displayName: 'Install dependencies'
    inputs:
      command: custom
      verbose: false
      customCommand: 'ci --omit=dev'

  - powershell: npx playwright install chromium-headless-shell
    displayName: 'Install headless chromium'

  # need to wait for some time for data to be deployed on server
  - powershell: Start-Sleep -Seconds 60
    displayName: 'Wait for 1m'
    condition: |
      and(
        succeeded(),
        eq(variables['Resources.TriggeringAlias'], 'websitesData')
      )

  - powershell: npx cross-env HEADLESS=true URL=rc.example-app.com DATA_URL=dev.example-app.com codeceptjs run
    displayName: 'Run rc env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        or(
          and(
            ne(variables['Build.Reason'], 'ResourceTrigger'),
            eq(variables['IsMasterBranch'], false)
          ),
          and(
            eq(variables['Resources.TriggeringAlias'], 'wla'),
            eq(variables['resources.pipeline.wla.sourceBranch'], 'refs/heads/development')
          )
        )
      )

  - powershell: npx cross-env HEADLESS=true URL=dev.example-app.com DATA_URL=dev.example-app.com codeceptjs run
    displayName: 'Run dev env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        or(
          and(
            ne(variables['Build.Reason'], 'ResourceTrigger'),
            eq(variables['IsMasterBranch'], true)
          ),
          and(
            eq(variables['Resources.TriggeringAlias'], 'wla'),
            eq(variables['resources.pipeline.wla.sourceBranch'], 'refs/heads/master')
          ),
          and(
            eq(variables['Resources.TriggeringAlias'], 'websitesData'),
            eq(variables['resources.pipeline.websitesData.sourceBranch'], 'refs/heads/development')
          )
        )
      )

  - powershell: npx cross-env HEADLESS=true URL=prod.example-app.com DATA_URL=prod.example-app.com codeceptjs run
    displayName: 'Run prod env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        or(
          and(
            ne(variables['Build.Reason'], 'ResourceTrigger'),
            eq(variables['IsMasterBranch'], true)
          ),
          and(
            eq(variables['Resources.TriggeringAlias'], 'wla'),
            eq(variables['resources.pipeline.wla.sourceBranch'], 'refs/heads/master')
          ),
          and(
            eq(variables['Resources.TriggeringAlias'], 'websitesData'),
            eq(variables['resources.pipeline.websitesData.sourceBranch'], 'refs/heads/master')
          )
        )
      )

  - task: PublishPipelineArtifact@1
    displayName: 'Publish data'
    inputs:
      targetPath: $(System.DefaultWorkingDirectory)/output
