trigger:
  branches:
    include:
      - master

pool:
  vmImage: 'windows-2022'

resources:
  pipelines:
    - pipeline: app
      source: websites-list-app
      trigger:
        branches:
          include:
            - master

    - pipeline: data
      source: StaticWebsites-Data
      trigger:
        branches:
          include:
            - master
            - development

steps:
  - task: NodeTool@0
    displayName: "use node 14"
    inputs:
      versionSpec: 14.x
      checkLatest: true

  - checkout: self
    displayName: "checkout"

  - task: Npm@1
    displayName: "npm ci"
    inputs:
      command: custom
      verbose: false
      customCommand: "ci --only=prod"
      #customCommand: "ci --only=prod --registry http://localhost:4873/"

  - powershell: Start-Sleep -Seconds 60
    displayName: "wait for 1m"
    condition: and(succeeded(), eq(variables['Build.Reason'], 'ResourceTrigger'))

  - task: Npm@1
    displayName: "run dev env tests"
    condition: |
      and(
        succeeded(),
        or(
          ne(variables['Build.Reason'], 'ResourceTrigger'),
          eq(variables['Resources.TriggeringAlias'], 'app'),
          and(
            eq(variables['Resources.TriggeringAlias'], 'data'),
            eq(variables['resources.pipeline.data.sourceBranch'], 'refs/heads/development')
          )
        )
      )
    inputs:
      command: custom
      verbose: false
      customCommand: "run codeceptjs:dev:headless"

  - task: Npm@1
    displayName: "run prod env tests"
    condition: |
      and(
        succeeded(),
        or(
          ne(variables['Build.Reason'], 'ResourceTrigger'),
          eq(variables['Resources.TriggeringAlias'], 'app'),
          and(
            eq(variables['Resources.TriggeringAlias'], 'data'),
            eq(variables['resources.pipeline.data.sourceBranch'], 'refs/heads/master')
          )
        )
      )
    inputs:
      command: custom
      verbose: false
      customCommand: "run codeceptjs:prod:headless"
