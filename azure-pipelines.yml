trigger:
  batch: true
  branches:
    include:
      - master
      - feature/*

pool:
  name: CI-POOL-NAME

resources:
  pipelines:
    - pipeline: app
      source: websites-list-app
      trigger:
        branches:
          include:
            - master
            - development

    - pipeline: data
      source: StaticWebsites-Data
      trigger:
        branches:
          include:
            - master
            - development

steps:
  - task: NodeTool@0
    displayName: 'Use node 18.16.x'
    inputs:
      versionSpec: 18.16.x
      checkLatest: true

  - checkout: self
    displayName: 'Checkout tests'

  - task: Npm@1
    displayName: 'Install dependencies'
    inputs:
      command: custom
      verbose: false
      customCommand: 'ci --omit=dev'

  - powershell: npx playwright install --with-deps
    displayName: 'Install playwright browsers'

  # need to wait for some time for data to be deployed on server
  - powershell: Start-Sleep -Seconds 60
    displayName: 'Wait for 1m'
    condition: |
      and(
        succeeded(),
        eq(variables['Resources.TriggeringAlias'], 'data')
      )

  - powershell: npx cross-env HEADLESS=true URL=rc.example-app.com DATA_URL=dev.example-app.com codeceptjs run
    displayName: 'Run rc env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        or(
          ne(variables['Build.Reason'], 'ResourceTrigger'),
          eq(variables['Resources.TriggeringAlias'], 'app')
        )
      )

  - powershell: npx cross-env HEADLESS=true URL=dev.example-app.com DATA_URL=dev.example-app.com codeceptjs run
    displayName: 'Run dev env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        eq(variables['Resources.TriggeringAlias'], 'data'),
        eq(variables['resources.pipeline.data.sourceBranch'], 'refs/heads/development')
      )

  - powershell: npx cross-env HEADLESS=true URL=prod.example-app.com DATA_URL=prod.example-app.com codeceptjs run
    displayName: 'Run prod env tests'
    continueOnError: true
    condition: |
      and(
        succeeded(),
        eq(variables['Resources.TriggeringAlias'], 'data'),
        eq(variables['resources.pipeline.data.sourceBranch'], 'refs/heads/master')
      )

  - task: PublishPipelineArtifact@1
    displayName: 'Publish data'
    inputs:
      targetPath: $(System.DefaultWorkingDirectory)/output
