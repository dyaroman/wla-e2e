trigger:
  branches:
    include:
      - master

pool:
  name: CI-POOL-0
  demands: npm

resources:
  pipelines:
    - pipeline: websites-list-app
      source: websites-list-app
      branch: master
      trigger: true

steps:
  - task: NodeTool@0
    displayName: "use node 14"
    inputs:
      versionSpec: 14.x
      checkLatest: true

  - task: Npm@1
    displayName: "npm ci"
    inputs:
      command: custom
      verbose: false
      customCommand: "ci --production --registry http://localhost:4873/"

  - task: Npm@1
    displayName: "run dev tests"
    inputs:
      command: custom
      verbose: true
      customCommand: "run codeceptjs:dev:headless"
